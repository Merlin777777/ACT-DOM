<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asia Crazy Team 封神戰隊 - DOM模擬器</title>
    <style>
        /* 本地字體對應 */
        @font-face {
            font-family: 'jf-openhuninn-2.1';
            src: local('jf-openhuninn-2.1'),
                 local('jf openhuninn 2.1'),
                 local('jf-open-hunyuan'),
                 url('jf-openhuninn-2.1.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* 強制全網頁套用粉圓體 */
        * {
            font-family: 'jf-openhuninn-2.1', 'PingFang TC', 'Microsoft JhengHei', sans-serif !important;
            box-sizing: border-box;
        }

        body {
            background-color: #121212;
            color: #e0e0e0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
        }

        .team-title {
            font-size: clamp(24px, 5vw, 38px);
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 5px;
            text-align: center;
            text-shadow: 0 0 10px rgba(109, 40, 217, 0.8);
            letter-spacing: 2px;
            background: linear-gradient(45deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .team-subtitle {
            font-size: clamp(12px, 3vw, 16px);
            font-weight: bold;
            color: #94a3b8;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-align: center;
        }

        .disclaimer {
            background-color: #333;
            color: #f87171;
            padding: 5px 15px;
            font-size: 12px;
            margin-bottom: 15px;
            border-radius: 4px;
            text-align: center;
            border: 1px solid #444;
        }

        .control-panel {
            display: flex;
            gap: 10px;
            align-items: center;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            margin-bottom: 10px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1000px;
            border: 1px solid #333;
            transition: box-shadow 0.3s ease;
        }
        
        .control-group {
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
            border-right: 1px solid #444;
            padding-right: 10px;
        }
        
        .control-group:last-child {
            border-right: none;
            padding-right: 0;
        }

        .btn {
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.1s;
            font-size: 13px;
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
        }
        .btn:active { transform: translateY(2px); box-shadow: none; }
        
        .btn-buy { background-color: #28a745; }
        .btn-sell { background-color: #dc3545; }
        .btn-random { background-color: #475569; } 
        .btn-toggle-on { background-color: #0284c7; } 
        .btn-toggle-off { background-color: #be185d; } 
        .btn-auto-off { background-color: #ea580c; } 
        .btn-auto-on { background-color: #7c3aed; animation: pulse 1.5s infinite; } 
        .btn-mute-off { background-color: #059669; }

        .select-speed {
            padding: 7px 5px;
            border-radius: 4px;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: white;
            font-weight: bold;
            outline: none;
            cursor: pointer;
            font-size: 13px;
        }

        .checkbox-label {
            font-size: 13px; 
            cursor: pointer; 
            color: #bae6fd; 
            display: flex; 
            align-items: center; 
            gap: 4px;
            font-weight: bold;
        }

        .filter-label {
            font-size: 13px; 
            color: #fcd34d; 
            display: flex; 
            align-items: center; 
            gap: 4px;
            font-weight: bold;
        }

        @keyframes pulse {
            0% { opacity: 1; box-shadow: 0 0 0 0 rgba(124, 58, 237, 0.7); }
            70% { opacity: 0.8; box-shadow: 0 0 0 10px rgba(124, 58, 237, 0); }
            100% { opacity: 1; box-shadow: 0 0 0 0 rgba(124, 58, 237, 0); }
        }

        .input-qty {
            width: 55px;
            padding: 6px;
            text-align: center;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: white;
            border-radius: 4px;
            font-size: 14px;
        }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        .hotkey-tip {
            font-size: 10px;
            color: #9ca3af;
            display: block;
            margin-top: 2px;
            font-weight: normal;
            text-align: center;
        }
        
        .responsive-wrapper {
            width: 100%;
            max-width: 1200px; 
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-radius: 8px;
            background: #1a1a1a;
            border: 1px solid #333;
        }

        .main-container {
            display: flex;
            gap: 15px;
            align-items: flex-start;
            padding: 15px;
            min-width: 1000px; 
        }

        canvas {
            background-color: #000000;
            border-radius: 4px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            flex-shrink: 0;
            border: 1px solid #333;
        }

        .canvas-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .canvas-label {
            font-size: 14px;
            color: #9ca3af;
            text-align: center;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .dom-master-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            margin-top: 25px;
        }

        table {
            border-collapse: collapse;
            font-size: 15px; 
            text-align: center;
            width: 100%;
            table-layout: fixed; 
        }
        
        .header-table {
            margin-bottom: 0;
            border-bottom: none;
        }

        #dom-viewport {
            height: 650px; 
            overflow: hidden; 
            position: relative;
            border-bottom: 1px solid #3f3f46;
        }

        #dom-table-body {
            position: absolute;
            top: 0;
            left: 0;
            margin: 0;
            will-change: transform;
        }

        th, td {
            padding: 0 8px; 
            border: 1px solid #3f3f46;
        }
        
        #dom-table-body tr {
            height: 35px;
        }

        th {
            background-color: #27272a;
            font-weight: bold;
            white-space: nowrap;
            color: #a1a1aa;
            height: 43px;
            font-size: 14px;
            border-bottom: 2px solid #121212;
        }
        
        /* 表格內輸入框樣式 */
        .cell-input {
            width: 100%;
            background: transparent;
            border: none;
            text-align: center;
            font-weight: bold;
            font-size: 15px; 
            outline: none;
            color: white !important; 
        }

        .bg-ask-zone { background-color: rgba(220, 53, 69, 0.08); } 
        .bg-bid-zone { background-color: rgba(0, 123, 255, 0.08); } 
        
        .col-limit-buy { background-color: rgba(0, 21, 148, 0.8); padding: 2px !important; } 
        .col-limit-sell { background-color: rgba(140, 0, 0, 0.8); padding: 2px !important; } 
        
        .delta-positive { color: #4ade80; font-weight: bold; background-color: rgba(74, 222, 128, 0.1); }
        .delta-negative { color: #f87171; font-weight: bold; background-color: rgba(248, 113, 113, 0.1); }
        
        .col-volume {
            position: relative;
            font-weight: bold;
            color: #fff;
            text-align: left;
            padding: 5px 10px !important; 
        }
        
        .volume-bar-wrapper {
            width: 100%;
            height: 24px; 
            line-height: 24px;
            font-size: 14px;
            border: 1px solid #475569; 
            border-radius: 3px;
            padding-left: 6px;
            box-sizing: border-box;
            background-color: #1e293b;
            transition: background 0.15s ease;
            text-shadow: 1px 1px 2px black;
        }
        
        .current-price {
            background-color: rgba(234, 179, 8, 0.2) !important;
            font-weight: bold;
        }

        .current-price-box {
            display: inline-block;
            border: 2px solid #fbbf24; 
            padding: 3px 8px;
            border-radius: 3px;
            background-color: #000000;
            color: #fbbf24;
            font-size: 16px;
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.3);
        }

        .best-ask-box { color: #fca5a5; font-weight: bold; font-size: 15px;}
        .best-bid-box { color: #93c5fd; font-weight: bold; font-size: 15px;}

        .price-click-zone { cursor: pointer; transition: background 0.1s; }
        .price-click-zone:hover { background-color: rgba(255, 255, 255, 0.1); }

        /* 綜合交易面板特別樣式 */
        .unified-panel-row {
            display: flex;
            width: 100%;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .panel-divider {
            width: 100%;
            height: 1px;
            background-color: #334155;
            margin: 10px 0;
        }

        @media (max-width: 800px) {
            .control-panel { padding: 10px; gap: 8px; }
            .btn { padding: 6px 10px; font-size: 12px; }
            .hotkey-tip { display: none; }
            .control-group { border-right: none; }
        }
    </style>
</head>
<body>

    <div class="team-title">Asia Crazy Team 封神戰隊</div>
    <div class="team-subtitle">DOM模擬器</div>

    <div class="disclaimer">本模擬器僅為知識講解，不作為任何投資建議</div>

    <div class="control-panel">
        <div class="control-group">
            <button class="btn btn-random" onclick="randomizeLimitOrders()">🎲 隨機配置</button>
            <button id="btn-toggle-autofill" class="btn btn-toggle-on" onclick="toggleAutoFill()">🤖 造市：開啟</button>
            <button id="btn-toggle-mute" class="btn btn-mute-off" onclick="toggleMute()">🔊 音效：開啟</button>
        </div>
        
        <div class="control-group">
            <button id="btn-toggle-auto" class="btn btn-auto-off" onclick="toggleAutoTrading()">⚡ 自動撮合：關閉</button>
            <select id="select-speed" class="select-speed" onchange="handleSpeedChange()">
                <option value="500">0.5x 慢速</option>
                <option value="250" selected>1x 正常</option>
                <option value="50">2x 快速</option>
                <option value="10">5x 極速</option>
            </select>
            <label class="checkbox-label" title="偶爾發動極端巨鯨單與隱藏冰山補充">
                <input type="checkbox" id="iceberg-mode" checked> 🧊 冰山與閃單演算法
            </label>
        </div>

        <div class="control-group">
            <label class="filter-label" title="氣泡過濾門檻">
                🎯 氣泡過濾 &ge;
                <input type="number" id="big-trade-filter" class="input-qty" value="550" min="1" style="width: 60px;">
            </label>
        </div>
    </div>

    <div id="smart-limit-panel" class="control-panel" style="background-color: #0f172a; border: 2px solid #3b82f6; max-width: 900px; flex-direction: column;">
        <div style="width: 100%; text-align: left; color: #93c5fd; font-weight: 900; font-size: 16px; margin-bottom: 5px; letter-spacing: 1px;">
            🎯 交易面板 (Trading Console)
        </div>
        
        <div class="unified-panel-row">
            <span style="color: #cbd5e1; font-weight: bold; background:#334155; padding: 4px 8px; border-radius:4px;">📜 限價單 (Limit)</span>
            
            <select id="limit-side" class="select-speed" style="background-color: #1e293b; border-color: #475569;">
                <option value="BUY">買單 (Bid)</option>
                <option value="SELL">賣單 (Ask)</option>
            </select>
            
            <span style="font-weight: bold; font-size: 14px;">價格:</span>
            <input type="number" id="limit-target-price" class="input-qty" step="0.1" value="2982.1" style="width: 90px;">
            
            <span style="font-weight: bold; font-size: 14px;">數量:</span>
            <input type="number" id="limit-target-qty" class="input-qty" value="100" min="1" style="width: 80px;">
            
            <button id="btn-manual-add" class="btn btn-toggle-on" style="background-color: #2563eb;" onclick="handleManualLimit('ADD')">掛單 (+)</button>
            <button id="btn-manual-cancel" class="btn" style="background-color: #475569;" onclick="handleManualLimit('CANCEL')">撤單 (-)</button>
        </div>

        <div class="panel-divider"></div>

        <div class="unified-panel-row">
            <span style="color: #fca5a5; font-weight: bold; background:#451a1a; padding: 4px 8px; border-radius:4px;">⚡ 市價單 (Market)</span>
            
            <div style="display: flex; align-items: center; gap: 5px; background: rgba(40, 167, 69, 0.1); padding: 5px 10px; border-radius: 5px; border: 1px solid rgba(40, 167, 69, 0.3);">
                <input type="number" id="buy-qty" class="input-qty" value="50" min="1" title="市價買入量">
                <div>
                    <button id="btn-buy-panel" class="btn btn-buy" onclick="handleMarketOrder('BUY', null)">買入 (B)</button>
                </div>
                <button id="btn-auto-buy" class="btn btn-auto-off" style="margin-left:5px;" onclick="toggleDirectionalAuto('BUY')">自動狂買</button>
            </div>
            
            <div style="display: flex; align-items: center; gap: 5px; background: rgba(220, 53, 69, 0.1); padding: 5px 10px; border-radius: 5px; border: 1px solid rgba(220, 53, 69, 0.3);">
                <input type="number" id="sell-qty" class="input-qty" value="50" min="1" title="市價賣出量">
                <div>
                    <button id="btn-sell-panel" class="btn btn-sell" onclick="handleMarketOrder('SELL', null)">賣出 (S)</button>
                </div>
                <button id="btn-auto-sell" class="btn btn-auto-off" style="margin-left:5px;" onclick="toggleDirectionalAuto('SELL')">自動狂賣</button>
            </div>
        </div>
        
        <span class="hotkey-tip" style="display: block; width: 100%; text-align: center; margin-top: 8px; color: #94a3b8;">
            ( 💡 提示：點擊表格價格可代入限價設定；快捷鍵: 掛單 [+] / 撤單 [-] / 市價買 [B] / 市價賣 [S] )
        </span>
    </div>

    <div class="responsive-wrapper">
        <div class="main-container">
            
            <div class="canvas-container">
                <div class="canvas-label">Price / CVD / OI 蠟燭圖 (5s/根)</div>
                <canvas id="kline-canvas" width="250" height="700"></canvas>
            </div>

            <div class="canvas-container">
                <div class="canvas-label">DOM 熱圖軌跡</div>
                <canvas id="heatmap-canvas" width="250" height="700"></canvas>
            </div>

            <div class="dom-master-container">
                <table class="header-table">
                    <colgroup>
                        <col style="width: 15%;"><col style="width: 10%;"><col style="width: 15%;">
                        <col style="width: 10%;"><col style="width: 15%;"><col style="width: 12%;"><col style="width: 23%;">
                    </colgroup>
                    <thead>
                        <tr>
                            <th>限價多</th><th>市價空</th><th>Price</th><th>市價多</th><th>限價空</th><th>Delta</th><th>Volume</th>
                        </tr>
                    </thead>
                </table>
                <div id="dom-viewport">
                    <table id="dom-table-body">
                        <colgroup>
                            <col style="width: 15%;"><col style="width: 10%;"><col style="width: 15%;">
                            <col style="width: 10%;"><col style="width: 15%;"><col style="width: 12%;"><col style="width: 23%;">
                        </colgroup>
                        <tbody id="dom-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

<script>
    let marketData = [];
    let currentPriceIndex = 40; 
    let renderAnchorIndex = 40; 
    const DOM_SAFE_ZONE = 6;    
    const ROW_HEIGHT = 35;      

    let globalCVD = 0;
    let globalOI = 245000 + Math.floor(Math.random() * 10000);

    let isAutoFillEnabled = true; 
    let isAutoTradingEnabled = false; 
    let isMuted = false;              
    
    let autoTradingTimer = null;      
    let autoBuyTimer = null;
    let autoSellTimer = null;
    let isAutoBuyEnabled = false;
    let isAutoSellEnabled = false;

    let currentHeatmapTrades = [];
    let currentKLineTrades = [];
    let activeSpoof = null;

    const HEATMAP_COLUMNS = 75; 
    let heatmapHistory = [];
    let heatmapTimer = null;

    const KLINE_INTERVAL = 5000; 
    const MAX_KLINES = 12;       
    let klineHistory = [];       
    let klineIntervalTimer = null; 

    let targetKLine = { 
        open: 0, high: 0, low: 0, close: 0, 
        cvdOpen: 0, cvdHigh: 0, cvdLow: 0, cvdClose: 0,
        oiOpen: 0, oiHigh: 0, oiLow: 0, oiClose: 0 
    };
    let currentKLine = { 
        open: 0, high: 0, low: 0, close: 0, 
        cvdOpen: 0, cvdHigh: 0, cvdLow: 0, cvdClose: 0,
        oiOpen: 0, oiHigh: 0, oiLow: 0, oiClose: 0 
    };

    function getHunYuanFont() {
        return '11px "jf-openhuninn-2.1", "PingFang TC", sans-serif';
    }

    function getBaseTranslateY() {
        return (650 / 2) - (30 * ROW_HEIGHT + (ROW_HEIGHT / 2));
    }

    function getDynamicLimitQty() {
        let rand = Math.random();
        if (rand < 0.65) return Math.floor(Math.random() * 70) + 10;
        else if (rand < 0.90) return Math.floor(Math.random() * 150) + 80;
        else return Math.floor(Math.random() * 500) + 250;
    }

    function getDynamicRandomQty() {
        let rand = Math.random();
        if (rand < 0.60) return Math.floor(Math.random() * 51) + 10;
        else if (rand < 0.90) return Math.floor(Math.random() * 141) + 60;
        else return Math.floor(Math.random() * 401) + 200;
    }

    function resetMarketData() {
        marketData = [];
        currentHeatmapTrades = [];
        currentKLineTrades = [];
        activeSpoof = null;
        
        globalCVD = 0;
        globalOI = 245000 + Math.floor(Math.random() * 10000);

        let basePrice = 2982.1;
        
        for (let i = 0; i < 81; i++) {
            marketData.push({
                price: basePrice + ((40 - i) * 0.1), 
                limitBuy: 0, limitSell: 0,
                marketSell: 0, marketBuy: 0, delta: 0, volume: 0,
                hiddenIcebergBuy: 0, hiddenIcebergSell: 0 // 新增冰山隱藏單庫存
            });
        }
        
        currentPriceIndex = 40;
        renderAnchorIndex = 40;
        heatmapHistory = []; 
        ensurePaddingDepth();
        
        let tableElement = document.getElementById('dom-table-body');
        tableElement.style.transition = 'none';
        tableElement.style.transform = `translateY(${getBaseTranslateY()}px)`;
    }

    let globalAudioCtx = null;

    function initAudio() {
        if (!globalAudioCtx) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            globalAudioCtx = new AudioContext();
        }
        if (globalAudioCtx.state === 'suspended') {
            globalAudioCtx.resume();
        }
    }

    function playSound(type) {
        if (isMuted) return; 
        initAudio();
        if (!globalAudioCtx) return;

        try {
            const masterGain = globalAudioCtx.createGain();
            masterGain.connect(globalAudioCtx.destination);

            if (type === 'BUY') {
                const frequencies = [1050, 1480, 2200];
                frequencies.forEach((freq, index) => {
                    const osc = globalAudioCtx.createOscillator();
                    const oscGain = globalAudioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, globalAudioCtx.currentTime);
                    // 再次調低音量，降低刺耳感
                    oscGain.gain.setValueAtTime(index === 0 ? 0.015 : 0.008, globalAudioCtx.currentTime);
                    oscGain.gain.exponentialRampToValueAtTime(0.0001, globalAudioCtx.currentTime + 1.2);
                    osc.connect(oscGain);
                    oscGain.connect(masterGain);
                    osc.start();
                    osc.stop(globalAudioCtx.currentTime + 1.3);
                });
            } else if (type === 'SELL') {
                const osc = globalAudioCtx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(280, globalAudioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(140, globalAudioCtx.currentTime + 0.08);
                // 再次調低音量
                masterGain.gain.setValueAtTime(0.02, globalAudioCtx.currentTime);
                masterGain.gain.exponentialRampToValueAtTime(0.0001, globalAudioCtx.currentTime + 0.12);
                osc.connect(masterGain);
                osc.start();
                osc.stop(globalAudioCtx.currentTime + 0.15);
            }
        } catch (e) {
            console.log("音訊連續播放受限:", e);
        }
    }

    function ensurePaddingDepth() {
        while (currentPriceIndex < 40) {
            let highestPrice = marketData[0].price;
            marketData.unshift({
                price: highestPrice + 0.1,
                limitBuy: 0,
                limitSell: isAutoFillEnabled ? getDynamicLimitQty() : 0,
                marketSell: 0, marketBuy: 0, delta: 0, volume: 0,
                hiddenIcebergBuy: 0, hiddenIcebergSell: 0
            });
            currentPriceIndex++; 
            renderAnchorIndex++; 
            if(activeSpoof) activeSpoof.index++;
        }
        while (currentPriceIndex > marketData.length - 41) {
            let lowestPrice = marketData[marketData.length - 1].price;
            marketData.push({
                price: lowestPrice - 0.1,
                limitBuy: isAutoFillEnabled ? getDynamicLimitQty() : 0,
                limitSell: 0,
                marketSell: 0, marketBuy: 0, delta: 0, volume: 0,
                hiddenIcebergBuy: 0, hiddenIcebergSell: 0
            });
        }
    }

    function recordHeatmapSnapshot() {
        if (marketData.length === 0) return;
        let visibleDepth = [];
        let startIndex = Math.max(0, currentPriceIndex - 10);
        let endIndex = Math.min(marketData.length - 1, currentPriceIndex + 10);
        
        for (let i = startIndex; i <= endIndex; i++) {
            visibleDepth.push({
                price: marketData[i].price,
                b: marketData[i].limitBuy, 
                s: marketData[i].limitSell 
            });
        }

        let snapshot = {
            price: marketData[currentPriceIndex].price,
            depth: visibleDepth,
            trades: currentHeatmapTrades 
        };
        heatmapHistory.push(snapshot);
        if(heatmapHistory.length > HEATMAP_COLUMNS) heatmapHistory.shift();

        currentHeatmapTrades = []; 
    }

    function startEngines() {
        if(heatmapTimer) clearInterval(heatmapTimer);
        heatmapTimer = setInterval(recordHeatmapSnapshot, 100); 

        if(klineIntervalTimer) clearInterval(klineIntervalTimer);
        klineIntervalTimer = setInterval(() => {
            klineHistory.push({
                open: targetKLine.open, high: targetKLine.high, low: targetKLine.low, close: targetKLine.close,
                cvdOpen: targetKLine.cvdOpen, cvdHigh: targetKLine.cvdHigh, cvdLow: targetKLine.cvdLow, cvdClose: targetKLine.cvdClose,
                oiOpen: targetKLine.oiOpen, oiHigh: targetKLine.oiHigh, oiLow: targetKLine.oiLow, oiClose: targetKLine.oiClose,
                trades: currentKLineTrades 
            });
            if(klineHistory.length > MAX_KLINES) klineHistory.shift();

            currentKLineTrades = []; 
            
            let currentClose = targetKLine.close;
            let currentCvdClose = targetKLine.cvdClose;
            let currentOiClose = targetKLine.oiClose;
            
            targetKLine = { 
                open: currentClose, high: currentClose, low: currentClose, close: currentClose, 
                cvdOpen: currentCvdClose, cvdHigh: currentCvdClose, cvdLow: currentCvdClose, cvdClose: currentCvdClose,
                oiOpen: currentOiClose, oiHigh: currentOiClose, oiLow: currentOiClose, oiClose: currentOiClose
            };
        }, KLINE_INTERVAL);
        
        // 更快、更活躍的造市與閃單引擎
        setInterval(processAdvancedMarketMaking, 800);
    }

    // ★ 真實冰山與閃單引擎 (Advanced Market Making Engine)
    function processAdvancedMarketMaking() {
        if (!isAutoTradingEnabled || !document.getElementById('iceberg-mode').checked) return;
        
        // 1. 處理閃單 (Spoofing)
        if (activeSpoof) {
            let row = marketData[activeSpoof.index];
            if (row) {
                if (activeSpoof.side === 'BUY') row.limitBuy = Math.max(0, row.limitBuy - activeSpoof.qty);
                if (activeSpoof.side === 'SELL') row.limitSell = Math.max(0, row.limitSell - activeSpoof.qty);
            }
            activeSpoof = null;
            renderDOM();
        }

        if (Math.random() < 0.25) { // 25% 機率出閃單牆
            let side = Math.random() > 0.5 ? 'BUY' : 'SELL';
            let offset = Math.floor(Math.random() * 3) + 2; // 距離 2~4 檔
            let targetIndex = side === 'BUY' ? currentPriceIndex + offset : currentPriceIndex - offset;
            
            if (targetIndex >= 0 && targetIndex < marketData.length) {
                let qty = Math.floor(Math.random() * 1200) + 600; 
                if (side === 'BUY') marketData[targetIndex].limitBuy += qty;
                if (side === 'SELL') marketData[targetIndex].limitSell += qty;
                
                activeSpoof = { index: targetIndex, side: side, qty: qty };
                renderDOM();
            }
        }

        // 2. 處理冰山補充 (Iceberg Replenishment)
        // 偵測盤口最佳買賣價，若低於 30，機率性瞬間補充 100~300 口
        let bestAskIndex = -1;
        for (let i = currentPriceIndex - 1; i >= 0; i--) { if (marketData[i].limitSell > 0) { bestAskIndex = i; break; } }
        let bestBidIndex = -1;
        for (let i = currentPriceIndex + 1; i < marketData.length; i++) { if (marketData[i].limitBuy > 0) { bestBidIndex = i; break; } }

        let icebergTriggered = false;
        if (bestAskIndex !== -1 && marketData[bestAskIndex].limitSell < 30 && Math.random() < 0.4) {
            marketData[bestAskIndex].limitSell += Math.floor(Math.random() * 200) + 100;
            icebergTriggered = true;
        }
        if (bestBidIndex !== -1 && marketData[bestBidIndex].limitBuy < 30 && Math.random() < 0.4) {
            marketData[bestBidIndex].limitBuy += Math.floor(Math.random() * 200) + 100;
            icebergTriggered = true;
        }
        
        if (icebergTriggered) renderDOM();
    }

    function getDynamicY(price, klineAreaHeight, allBars) {
        if (allBars.length === 0) {
            let percentage = (2980.6 - price) / (2980.6 - 2979.2);
            return 35 + percentage * (klineAreaHeight - 65);
        }
        let minP = Infinity, maxP = -Infinity;
        allBars.forEach(b => {
            if (b.low < minP) minP = b.low;
            if (b.high > maxP) maxP = b.high;
        });

        let padding = (maxP - minP) * 0.15;
        if (padding === 0) padding = 0.2; 
        
        let minBound = minP - padding;
        let maxBound = maxP + padding;

        let ratio = (price - minBound) / (maxBound - minBound);
        return (klineAreaHeight - 40) - (ratio * (klineAreaHeight - 65));
    }

    function drawGridLines(ctx, width, height, isDynamic, minBound, maxBound) {
        ctx.strokeStyle = '#2d2d2d';
        ctx.lineWidth = 1;
        ctx.fillStyle = 'rgba(156, 163, 175, 0.8)'; 
        ctx.font = '11px sans-serif';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';

        if (!isDynamic) {
            let priceRange = maxBound - minBound;
            for (let i = 0; i <= 20; i++) {
                let y = 35 + (i * ((height - 65) / 20)); 
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
                
                if (i % 4 === 0) {
                    let p = maxBound - (i/20)*priceRange;
                    ctx.fillText(p.toFixed(1), width - 4, y - 6);
                }
            }
        } else {
            for (let i = 0; i <= 10; i++) {
                let y = 25 + (i * (height - 65) / 10);
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
                
                if (i % 2 === 0) {
                    let p = maxBound - (i/10)*(maxBound - minBound);
                    ctx.fillText(p.toFixed(1), width - 4, y - 6);
                }
            }
        }
    }

    function drawBubbles(ctx, trades, xPos, getYFunc) {
        if (!trades) return;
        trades.forEach(t => {
            let ty = getYFunc(t.price);
            if (ty < 0 || ty > ctx.canvas.height + 20) return;
            
            let r = Math.min(Math.max(t.volume * 0.15, 4), 28); 
            
            ctx.beginPath();
            ctx.arc(xPos, ty, r, 0, Math.PI * 2);
            ctx.fillStyle = t.type === 'BUY' ? 'rgba(74, 222, 128, 0.45)' : 'rgba(248, 113, 113, 0.45)';
            ctx.fill();
            ctx.lineWidth = 1;
            ctx.strokeStyle = t.type === 'BUY' ? 'rgba(74, 222, 128, 0.9)' : 'rgba(248, 113, 113, 0.9)';
            ctx.stroke();

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(xPos - 1, ty - 1, 2, 2); 
        });
    }

    function animateAll() {

        currentKLine.close = targetKLine.close;

    function drawKLineCanvas() {
        const canvas = document.getElementById('kline-canvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        let klineAreaH = 400;
        let cvdAreaTop = 400;
        let cvdAreaH = 150; 
        let oiAreaTop = 550;
        let oiAreaH = 150; 

        // === 1. 價格 K 線 ===
        let allBars = [...klineHistory, { high: currentKLine.high, low: currentKLine.low }];
        let minP = Infinity, maxP = -Infinity;
        allBars.forEach(b => {
            if (b.low < minP) minP = b.low;
            if (b.high > maxP) maxP = b.high;
        });
        if (minP === Infinity) { minP = 2979.2; maxP = 2980.6; }

        let padding = (maxP - minP) * 0.15;
        if (padding === 0) padding = 0.2; 
        let minBound = minP - padding;
        let maxBound = maxP + padding;

        drawGridLines(ctx, canvas.width, klineAreaH, true, minBound, maxBound);

        let colWidth = canvas.width / (MAX_KLINES + 1.5); 
        let candleWidth = colWidth * 0.6; 

        klineHistory.forEach((candle, index) => {
            let xCenter = (index + 0.5) * colWidth;
            let yOpen = getDynamicY(candle.open, klineAreaH, allBars);
            let yClose = getDynamicY(candle.close, klineAreaH, allBars);
            let yHigh = getDynamicY(candle.high, klineAreaH, allBars);
            let yLow = getDynamicY(candle.low, klineAreaH, allBars);
            
            let isBullish = candle.close >= candle.open;
            let themeColor = isBullish ? '#4ade80' : '#f87171';

            ctx.strokeStyle = themeColor;
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(xCenter, yHigh); ctx.lineTo(xCenter, yLow); ctx.stroke();

            ctx.fillStyle = themeColor;
            let boxHeight = yClose - yOpen;
            if (Math.abs(boxHeight) < 1.5) boxHeight = isBullish ? -1.5 : 1.5; 
            ctx.fillRect(xCenter - (candleWidth / 2), yOpen, candleWidth, boxHeight);

            drawBubbles(ctx, candle.trades, xCenter, (p) => getDynamicY(p, klineAreaH, allBars));
        });

        let currentXCenter = (klineHistory.length + 0.5) * colWidth;
        let yOpenCurr = getDynamicY(currentKLine.open, klineAreaH, allBars);
        let yCurrentSmooth = getDynamicY(currentKLine.close, klineAreaH, allBars);
        let yHighCurr = getDynamicY(currentKLine.high, klineAreaH, allBars);
        let yLowCurr = getDynamicY(currentKLine.low, klineAreaH, allBars);

        let isBullishCurr = currentKLine.close >= currentKLine.open;
        let themeColorCurr = isBullishCurr ? '#4ade80' : '#f87171';

        ctx.strokeStyle = themeColorCurr;
        ctx.lineWidth = 2.5; 
        ctx.beginPath(); ctx.moveTo(currentXCenter, yHighCurr); ctx.lineTo(currentXCenter, yLowCurr); ctx.stroke();

        ctx.fillStyle = themeColorCurr;
        let boxHeightCurr = yCurrentSmooth - yOpenCurr;
        if (Math.abs(boxHeightCurr) < 2) boxHeightCurr = isBullishCurr ? -2 : 2;
        ctx.fillRect(currentXCenter - (candleWidth / 2), yOpenCurr, candleWidth, boxHeightCurr);

        drawBubbles(ctx, currentKLineTrades, currentXCenter, (p) => getDynamicY(p, klineAreaH, allBars));

        ctx.strokeStyle = 'rgba(251, 191, 36, 0.5)';
        ctx.setLineDash([4, 4]);
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(0, yCurrentSmooth); ctx.lineTo(canvas.width, yCurrentSmooth); ctx.stroke();
        ctx.setLineDash([]); 

        let currentRealPrice = marketData[currentPriceIndex].price;
        ctx.fillStyle = '#ffffff';
        ctx.font = getHunYuanFont(); 
        ctx.fillText(`現價: ${currentRealPrice.toFixed(1)}`, 60, klineAreaH - 10);

        // === 2. CVD 蠟燭圖 ===
        ctx.strokeStyle = '#3f3f46';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, cvdAreaTop); ctx.lineTo(canvas.width, cvdAreaTop); ctx.stroke();

        ctx.fillStyle = '#9ca3af';
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('CVD Candles', 10, cvdAreaTop + 18);

        let allCvdBars = [...klineHistory, { 
            cvdOpen: currentKLine.cvdOpen, cvdHigh: currentKLine.cvdHigh, 
            cvdLow: currentKLine.cvdLow, cvdClose: currentKLine.cvdClose 
        }];
        
        let minCVD = Math.min(...allCvdBars.map(b => b.cvdLow));
        let maxCVD = Math.max(...allCvdBars.map(b => b.cvdHigh));
        if (maxCVD === minCVD) { maxCVD += 10; minCVD -= 10; }
        
        let cvdPadding = (maxCVD - minCVD) * 0.1;
        if (cvdPadding === 0) cvdPadding = 10;
        let cvdMinBound = minCVD - cvdPadding;
        let cvdMaxBound = maxCVD + cvdPadding;
        let cvdRange = cvdMaxBound - cvdMinBound;

        function getCvdY(val) {
            let ratio = (cvdMaxBound - val) / cvdRange;
            return cvdAreaTop + 25 + ratio * (cvdAreaH - 35);
        }

        if (cvdMinBound <= 0 && cvdMaxBound >= 0) {
            let zeroY = getCvdY(0);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.setLineDash([2, 2]);
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(0, zeroY); ctx.lineTo(canvas.width, zeroY); ctx.stroke();
            ctx.setLineDash([]);
        }

        allCvdBars.forEach((candle, index) => {
            let xCenter = (index + 0.5) * colWidth;
            let yOpen = getCvdY(candle.cvdOpen);
            let yClose = getCvdY(candle.cvdClose);
            let yHigh = getCvdY(candle.cvdHigh);
            let yLow = getCvdY(candle.cvdLow);
            
            let isCvdBullish = candle.cvdClose >= candle.cvdOpen;
            let cvdColor = isCvdBullish ? '#4ade80' : '#f87171';

            ctx.strokeStyle = cvdColor;
            ctx.lineWidth = (index === allCvdBars.length - 1) ? 2.5 : 1.5;
            
            ctx.beginPath(); 
            ctx.moveTo(xCenter, yHigh); 
            ctx.lineTo(xCenter, yLow); 
            ctx.stroke();

            ctx.fillStyle = cvdColor;
            let boxHeight = yClose - yOpen;
            if (Math.abs(boxHeight) < 1.5) boxHeight = isCvdBullish ? -1.5 : 1.5; 
            ctx.fillRect(xCenter - (candleWidth / 2), yOpen, candleWidth, boxHeight);
        });

        // === 3. OI 蠟燭圖 ===
        ctx.strokeStyle = '#3f3f46';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, oiAreaTop); ctx.lineTo(canvas.width, oiAreaTop); ctx.stroke();

        ctx.fillStyle = '#9ca3af';
        ctx.textAlign = 'left';
        ctx.fillText('OI Candles', 10, oiAreaTop + 18);

        let allOiBars = [...klineHistory, { 
            oiOpen: currentKLine.oiOpen, oiHigh: currentKLine.oiHigh, 
            oiLow: currentKLine.oiLow, oiClose: currentKLine.oiClose 
        }];

        let minOI = Math.min(...allOiBars.map(b => b.oiLow));
        let maxOI = Math.max(...allOiBars.map(b => b.oiHigh));
        if (maxOI === minOI) { maxOI += 100; minOI -= 100; }

        let oiPadding = (maxOI - minOI) * 0.1;
        if (oiPadding === 0) oiPadding = 100;
        let oiMinBound = minOI - oiPadding;
        let oiMaxBound = maxOI + oiPadding;
        let oiRange = oiMaxBound - oiMinBound;

        function getOiY(val) {
            let ratio = (oiMaxBound - val) / oiRange;
            return oiAreaTop + 25 + ratio * (oiAreaH - 35);
        }

        allOiBars.forEach((candle, index) => {
            let xCenter = (index + 0.5) * colWidth;
            let yOpen = getOiY(candle.oiOpen);
            let yClose = getOiY(candle.oiClose);
            let yHigh = getOiY(candle.oiHigh);
            let yLow = getOiY(candle.oiLow);

            let isOiBullish = candle.oiClose >= candle.oiOpen;
            let oiColor = isOiBullish ? '#fbbf24' : '#60a5fa';

            ctx.strokeStyle = oiColor;
            ctx.lineWidth = (index === allOiBars.length - 1) ? 2.5 : 1.5;

            ctx.beginPath();
            ctx.moveTo(xCenter, yHigh);
            ctx.lineTo(xCenter, yLow);
            ctx.stroke();

            ctx.fillStyle = oiColor;
            let boxHeight = yClose - yOpen;
            if (Math.abs(boxHeight) < 1.5) boxHeight = isOiBullish ? -1.5 : 1.5;
            ctx.fillRect(xCenter - (candleWidth / 2), yOpen, candleWidth, boxHeight);
        });
    }

    function drawHeatmapCanvas() {
        const canvas = document.getElementById('heatmap-canvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (heatmapHistory.length === 0) return;

        let colWidth = canvas.width / HEATMAP_COLUMNS;
        let maxDepthParam = 350; 

        let currentHighestPrice = marketData[Math.max(0, currentPriceIndex - 10)].price;
        let currentLowestPrice = marketData[Math.min(marketData.length - 1, currentPriceIndex + 10)].price;
        let priceRange = currentHighestPrice - currentLowestPrice;
        if (priceRange <= 0) priceRange = 2.0;

        function getY(price) {
            let percentage = (currentHighestPrice - price) / priceRange;
            return 35 + percentage * (canvas.height - 65); 
        }

        drawGridLines(ctx, canvas.width, canvas.height, false, currentLowestPrice, currentHighestPrice);

        let rectH = ((canvas.height - 65) / 20) + 0.5;

        heatmapHistory.forEach((snap, hIndex) => {
            let x = canvas.width - ((heatmapHistory.length - hIndex) * colWidth);
            
            snap.depth.forEach((d) => {
                let yCenter = getY(d.price);
                if (yCenter < 0 || yCenter > canvas.height + 20) return;

                let rectY = yCenter - (rectH / 2);

                if (d.s > 0) {
                    let alpha = Math.min(d.s / maxDepthParam, 1);
                    ctx.fillStyle = `rgba(220, 53, 69, ${alpha * 0.9})`;
                    ctx.fillRect(x, rectY, colWidth + 0.6, rectH); 
                } else if (d.b > 0) {
                    let alpha = Math.min(d.b / maxDepthParam, 1);
                    ctx.fillStyle = `rgba(0, 100, 255, ${alpha * 0.9})`; 
                    ctx.fillRect(x, rectY, colWidth + 0.6, rectH);
                }
            });
        });

        ctx.beginPath();
        ctx.strokeStyle = '#fbbf24'; 
        ctx.lineWidth = 2;
        ctx.shadowColor = '#000'; ctx.shadowBlur = 4;

        heatmapHistory.forEach((snap, hIndex) => {
            let x = canvas.width - ((heatmapHistory.length - hIndex) * colWidth) + (colWidth / 2);
            let y = getY(snap.price);
            
            if (hIndex === 0) {
                ctx.moveTo(x, y);
            } else {
                let prevSnap = heatmapHistory[hIndex - 1];
                let prevY = getY(prevSnap.price);
                ctx.lineTo(x, prevY); 
                ctx.lineTo(x, y);
            }
        });
        ctx.stroke();
        ctx.shadowBlur = 0; 

        heatmapHistory.forEach((snap, hIndex) => {
            let x = canvas.width - ((heatmapHistory.length - hIndex) * colWidth) + (colWidth / 2);
            drawBubbles(ctx, snap.trades, x, getY);
        });

        let yCurrentSmoothFixed = getY(currentKLine.close);
        ctx.strokeStyle = 'rgba(251, 191, 36, 0.8)';
        ctx.setLineDash([4, 4]);
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(0, yCurrentSmoothFixed); ctx.lineTo(canvas.width, yCurrentSmoothFixed); ctx.stroke();
        ctx.setLineDash([]); 
    }

    // ★ 叢發性市場節奏 (Bursty Volatility Algorithm)
    function scheduleNextAutoTrade() {
        if (!isAutoTradingEnabled) return;
        
        let speedBase = parseInt(document.getElementById('select-speed').value);
        // 30% 機率爆發極速追單 (0.2x 延遲)，70% 機率正常間隔
        let isBursty = Math.random() < 0.3;
        let delay = isBursty ? Math.random() * (speedBase * 0.2) : (Math.random() * speedBase + speedBase * 0.5);
        
        autoTradingTimer = setTimeout(() => {
            let side = Math.random() > 0.5 ? 'BUY' : 'SELL';
            // 如果是爆發期，下的單量也會稍微變大
            let qty = getDynamicRandomQty();
            if (isBursty && Math.random() < 0.5) qty *= 1.5;
            
            if (qty > 0) handleMarketOrder(side, qty);
            scheduleNextAutoTrade();
        }, delay);
    }

        if (isAutoTradingEnabled) {

            } else {
                btn.className = "btn btn-auto-off";
                btn.innerText = "自動狂賣";
                clearInterval(autoSellTimer);
            }
        }
    }

    function handleSpeedChange() {
        if (isAutoTradingEnabled) {
            clearTimeout(autoTradingTimer);
            scheduleNextAutoTrade();
        }
        if (isAutoBuyEnabled) restartDirectionalInterval('BUY');
        if (isAutoSellEnabled) restartDirectionalInterval('SELL');
    }

    function autoFillMarketDepth() {
        marketData.forEach((row, index) => {
            if (index < currentPriceIndex) {
                if (row.limitSell === 0 && row.limitBuy === 0) row.limitSell = getDynamicLimitQty();
                row.limitBuy = 0; 
            } else if (index > currentPriceIndex) {
                if (row.limitBuy === 0 && row.limitSell === 0) row.limitBuy = getDynamicLimitQty();
                row.limitSell = 0; 
            } else {
                row.limitBuy = 0;
                row.limitSell = 0;
            }
        });
    }

    window.addEventListener('click', initAudio);
    window.addEventListener('touchstart', initAudio, {passive: true});

    // 處理所有快捷鍵
    window.addEventListener('keydown', function(event) {
        if (event.target.tagName === 'INPUT') return;

        const key = event.key.toLowerCase();
        
        if (key === 'b') {
            event.preventDefault();
            handleMarketOrder('BUY', null);
            const btn = document.getElementById('btn-buy-panel');
            btn.style.transform = 'translateY(2px)';
            setTimeout(() => btn.style.transform = 'none', 100);
        } else if (key === 's') {
            event.preventDefault();
            handleMarketOrder('SELL', null);
            const btn = document.getElementById('btn-sell-panel');
            btn.style.transform = 'translateY(2px)';
            setTimeout(() => btn.style.transform = 'none', 100);
        } else if (key === '+' || key === '=') {
            event.preventDefault();
            handleManualLimit('ADD');
            const btn = document.getElementById('btn-manual-add');
            btn.style.transform = 'translateY(2px)';
            setTimeout(() => btn.style.transform = 'none', 100);
        } else if (key === '-' || key === '_') {
            event.preventDefault();
            handleManualLimit('CANCEL');
            const btn = document.getElementById('btn-manual-cancel');
            btn.style.transform = 'translateY(2px)';
            setTimeout(() => btn.style.transform = 'none', 100);
        }
    });

    // 處理智慧掛單面板 (連動價格、數量與方向)
    function handlePriceClick(price, isBidSide, currentQty) {
        document.getElementById('limit-target-price').value = price.toFixed(1);
        document.getElementById('limit-side').value = isBidSide ? 'BUY' : 'SELL';
        
        if (currentQty > 0) {
            document.getElementById('limit-target-qty').value = currentQty;
        } else {
            document.getElementById('limit-target-qty').value = 50; 
        }
        
        const panel = document.getElementById('smart-limit-panel');
        panel.style.boxShadow = "0 0 20px #3b82f6";
        setTimeout(() => panel.style.boxShadow = "none", 300);
    }

    function handleManualLimit(action) {
        let side = document.getElementById('limit-side').value;
        let price = parseFloat(document.getElementById('limit-target-price').value);
        let qty = parseInt(document.getElementById('limit-target-qty').value);

        if (isNaN(price) || isNaN(qty) || qty <= 0) {
            alert("請輸入有效的掛單價格與數量！");
            return;
        }

        while (price > marketData[0].price + 0.05) {
            let newPrice = marketData[0].price + 0.1;
            marketData.unshift({
                price: newPrice, limitBuy: 0, limitSell: isAutoFillEnabled ? getDynamicLimitQty() : 0,
                marketSell: 0, marketBuy: 0, delta: 0, volume: 0
            });
            currentPriceIndex++; renderAnchorIndex++;
            if(activeSpoof) activeSpoof.index++;
        }
        while (price < marketData[marketData.length - 1].price - 0.05) {
            let newPrice = marketData[marketData.length - 1].price - 0.1;
            marketData.push({
                price: newPrice, limitBuy: isAutoFillEnabled ? getDynamicLimitQty() : 0, limitSell: 0,
                marketSell: 0, marketBuy: 0, delta: 0, volume: 0
            });
        }

        let targetIndex = marketData.findIndex(r => Math.abs(r.price - price) < 0.01);
        if (targetIndex !== -1) {
            if (side === 'BUY') {
                if (action === 'ADD') {
                    marketData[targetIndex].limitBuy += qty;
                } else if (action === 'CANCEL') {
                    marketData[targetIndex].limitBuy = Math.max(0, marketData[targetIndex].limitBuy - qty);
                }
            } else {
                if (action === 'ADD') {
                    marketData[targetIndex].limitSell += qty;
                } else if (action === 'CANCEL') {
                    marketData[targetIndex].limitSell = Math.max(0, marketData[targetIndex].limitSell - qty);
                }
            }
            renderDOM();
        }
    }

    function updateLimitValue(index, field, value) {
        marketData[index][field] = parseInt(value) || 0;
        renderDOM();
    }

    function renderDOM() {
        const tbody = document.getElementById('dom-body');
        tbody.innerHTML = '';

        let maxVolume = Math.max(...marketData.map(r => r.volume), 1);
        let maxLimitParam = 350;

        let bestAskIndex = -1;
        for (let i = currentPriceIndex - 1; i >= 0; i--) {
            if (marketData[i].limitSell > 0) { bestAskIndex = i; break; }
        }
        
        let bestBidIndex = -1;
        for (let i = currentPriceIndex + 1; i < marketData.length; i++) {
            if (marketData[i].limitBuy > 0) { bestBidIndex = i; break; }
        }

        let startIndex = renderAnchorIndex - 30;
        let endIndex = renderAnchorIndex + 30;

        for (let index = startIndex; index <= endIndex; index++) {
            let row = marketData[index];
            if (!row) continue;

            const tr = document.createElement('tr');
            let isCurrentPriceRow = (index === currentPriceIndex);
            let rowBgClass = '';

            if (index < currentPriceIndex) rowBgClass = 'bg-ask-zone';
            else if (index > currentPriceIndex) rowBgClass = 'bg-bid-zone';
            else rowBgClass = 'current-price';

            tr.className = rowBgClass;

            let deltaClass = '';
            if (row.delta > 0) deltaClass = 'delta-positive';
            else if (row.delta < 0) deltaClass = 'delta-negative';

            if (!isAutoFillEnabled) {
                if (index < currentPriceIndex) row.limitBuy = 0;
                if (index > currentPriceIndex) row.limitSell = 0;
                if (index === currentPriceIndex) { row.limitBuy = 0; row.limitSell = 0; }
            }

            let buyLimitPercentage = (row.limitBuy / maxLimitParam) * 100;
            let buyLimitStyle = row.limitBuy > 0 
                ? `background: linear-gradient(to left, rgba(0, 100, 255, 0.4) ${buyLimitPercentage}%, rgba(0, 21, 148, 0.8) ${buyLimitPercentage}%);` 
                : 'background-color: transparent;';

            let sellLimitPercentage = (row.limitSell / maxLimitParam) * 100;
            let sellLimitStyle = row.limitSell > 0 
                ? `background: linear-gradient(to right, rgba(220, 53, 69, 0.4) ${sellLimitPercentage}%, rgba(140, 0, 0, 0.8) ${sellLimitPercentage}%);` 
                : 'background-color: transparent;';

            let volPercentage = (row.volume / maxVolume) * 100;
            let isVolumeLeader = (row.volume > 0 && row.volume === maxVolume);
            let barColor = isVolumeLeader ? '#fca5a5' : '#64748b';

            let volStyle = row.volume > 0 
                ? `background: linear-gradient(to right, ${barColor} ${volPercentage}%, transparent ${volPercentage}%);` 
                : '';

            let priceFormatted = row.price.toFixed(1);
            let priceDisplay = priceFormatted;

            if (isCurrentPriceRow) priceDisplay = `<span class="current-price-box">${priceFormatted}</span>`;
            else if (index === bestAskIndex) priceDisplay = `<span class="best-ask-box">[ ${priceFormatted} ]</span>`;
            else if (index === bestBidIndex) priceDisplay = `<span class="best-bid-box">[ ${priceFormatted} ]</span>`;

            let isBidSide = index > currentPriceIndex;
            let qtyToPass = isBidSide ? (row.limitBuy || 0) : (row.limitSell || 0);

            tr.innerHTML = `
                <td class="col-limit-buy" style="${buyLimitStyle}">
                    <input type="number" class="cell-input" value="${row.limitBuy || ''}" min="0" onchange="updateLimitValue(${index}, 'limitBuy', this.value)">
                </td>
                <td>${row.marketSell || ''}</td>
                <td class="price-click-zone" onclick="handlePriceClick(${row.price}, ${isBidSide}, ${qtyToPass})" title="點擊帶入掛單面板">
                    ${priceDisplay}
                </td>
                <td>${row.marketBuy || ''}</td>
                <td class="col-limit-sell" style="${sellLimitStyle}">
                    <input type="number" class="cell-input" value="${row.limitSell || ''}" min="0" onchange="updateLimitValue(${index}, 'limitSell', this.value)">
                </td>
                <td class="${deltaClass}">${row.delta || ''}</td>
                <td class="col-volume">
                    <div class="volume-bar-wrapper" style="${volStyle}">${row.volume || ''}</div>
                </td>
            `;
            tbody.appendChild(tr);
        }
    }

    function checkAndRecenterDOM() {
        let tickDiff = currentPriceIndex - renderAnchorIndex;
        
        if (Math.abs(tickDiff) >= DOM_SAFE_ZONE) {
            let deltaRows = tickDiff; 
            renderAnchorIndex = currentPriceIndex; 
            
            let tableElement = document.getElementById('dom-table-body');
            
            const style = window.getComputedStyle(tableElement);
            const matrix = new DOMMatrixReadOnly(style.transform);
            const currentY = matrix.m42; 
            
            let jumpOffsetPx = deltaRows * ROW_HEIGHT;
            let seamlessY = currentY + jumpOffsetPx;
            
            tableElement.style.transition = 'none';
            tableElement.style.transform = `translateY(${seamlessY}px)`;
            
            void tableElement.offsetHeight;
            
            tableElement.style.transition = 'transform 0.8s cubic-bezier(0.25, 1, 0.4, 1)';
            tableElement.style.transform = `translateY(${getBaseTranslateY()}px)`;
        }
    }

    function handleMarketOrder(type, customQty = null) {
        playSound(type);

        let qty = customQty !== null 
            ? customQty 
            : parseInt(document.getElementById(type === 'BUY' ? 'buy-qty' : 'sell-qty').value) || 0;
            
        if (qty <= 0) return;

        let totalCost = 0;
        let totalFilled = 0;

        if (type === 'BUY') {
            let i = currentPriceIndex - 1;
            while (qty > 0) {
                if (i < 0) {
                    let highestPrice = marketData[0].price;
                    marketData.unshift({
                        price: highestPrice + 0.1, limitBuy: 0,
                        limitSell: isAutoFillEnabled ? getDynamicLimitQty() : 5, 
                        marketSell: 0, marketBuy: 0, delta: 0, volume: 0
                    });
                    currentPriceIndex++; renderAnchorIndex++; i = 0; 
                    if(activeSpoof) activeSpoof.index++;
                }

                if (marketData[i].limitSell > 0) {
                    let filled = Math.min(qty, marketData[i].limitSell);
                    marketData[i].marketBuy += filled;
                    marketData[i].delta = marketData[i].marketBuy - marketData[i].marketSell;
                    marketData[i].volume = marketData[i].marketBuy + marketData[i].marketSell;
                    
                    totalCost += filled * marketData[i].price;
                    totalFilled += filled;

                    if (qty >= marketData[i].limitSell) {
                        qty -= marketData[i].limitSell;
                        marketData[i].limitSell = 0;
                        currentPriceIndex = i; 
                    } else {
                        marketData[i].limitSell -= qty;
                        qty = 0;
                        currentPriceIndex = i + 1; 
                        break;
                    }
                }
                i--;
            }
            
            globalCVD += totalFilled;
            targetKLine.cvdClose = globalCVD;
            if (globalCVD > targetKLine.cvdHigh) targetKLine.cvdHigh = globalCVD;
            if (globalCVD < targetKLine.cvdLow) targetKLine.cvdLow = globalCVD;
            
        } else if (type === 'SELL') {
            let i = currentPriceIndex;
            while (qty > 0) {
                if (i >= marketData.length) {
                    let lowestPrice = marketData[marketData.length - 1].price;
                    marketData.push({
                        price: lowestPrice - 0.1, limitBuy: isAutoFillEnabled ? getDynamicLimitQty() : 5,
                        limitSell: 0, marketSell: 0, marketBuy: 0, delta: 0, volume: 0
                    });
                }

                if (marketData[i].limitBuy > 0) {
                    let filled = Math.min(qty, marketData[i].limitBuy);
                    marketData[i].marketSell += filled;
                    marketData[i].delta = marketData[i].marketBuy - marketData[i].marketSell;
                    marketData[i].volume = marketData[i].marketBuy + marketData[i].marketSell;

                    totalCost += filled * marketData[i].price;
                    totalFilled += filled;

                    if (qty >= marketData[i].limitBuy) {
                        qty -= marketData[i].limitBuy;
                        marketData[i].limitBuy = 0;
                        currentPriceIndex = i;
                    } else {
                        marketData[i].limitBuy -= qty;
                        qty = 0;
                        currentPriceIndex = i - 1; 
                        break;
                    }
                }
                i++;
            }
            
            globalCVD -= totalFilled;
            targetKLine.cvdClose = globalCVD;
            if (globalCVD > targetKLine.cvdHigh) targetKLine.cvdHigh = globalCVD;
            if (globalCVD < targetKLine.cvdLow) targetKLine.cvdLow = globalCVD;
        }

        // ★ 動態 OI 意圖引擎 2.0 (Context-Aware OI Engine)
        let isBreakout = totalFilled > 300; // 判斷是否為大額連續掃單（突破）
        let oiChange = 0;
        let intentRoll = Math.random();

        if (isBreakout) {
            // 大額掃單發生時，高機率是動能突破(OI增) 或 觸發停損盤(OI減)
            if (intentRoll < 0.55) {
                oiChange = Math.floor(totalFilled * (Math.random() * 0.4 + 0.6)); // 強烈建倉
            } else {
                oiChange = -Math.floor(totalFilled * (Math.random() * 0.4 + 0.4)); // 停損出局
            }
        } else {
            // 一般摩擦期
            if (intentRoll < 0.40) {
                oiChange = Math.floor(totalFilled * 0.3);
            } else if (intentRoll < 0.70) {
                oiChange = -Math.floor(totalFilled * 0.3);
            } else {
                oiChange = Math.floor(totalFilled * (Math.random() * 0.2 - 0.1)); // 換手，幾乎不變
            }
        }

        globalOI += oiChange;
        if (globalOI < 0) globalOI = 0; 

        targetKLine.oiClose = globalOI;
        if (globalOI > targetKLine.oiHigh) targetKLine.oiHigh = globalOI;
        if (globalOI < targetKLine.oiLow) targetKLine.oiLow = globalOI;
        
        let minBigTradeSize = parseInt(document.getElementById('big-trade-filter').value) || 1;
        
        if (totalFilled >= minBigTradeSize) {
            let vwap = totalCost / totalFilled; 
            let tradeObj = { price: vwap, volume: totalFilled, type: type };
            currentHeatmapTrades.push(tradeObj);
            currentKLineTrades.push(tradeObj);
        }

        ensurePaddingDepth();

        let newPrice = marketData[currentPriceIndex].price;
        targetKLine.close = newPrice; 
        if (newPrice > targetKLine.high) targetKLine.high = newPrice; 
        if (newPrice < targetKLine.low) targetKLine.low = newPrice;   

        if (isAutoFillEnabled) autoFillMarketDepth();
        renderDOM(); 
        checkAndRecenterDOM(); 
        recordHeatmapSnapshot(); 
    }

    document.addEventListener("DOMContentLoaded", function() {
        if (document.fonts) {
            document.fonts.load('12px "jf-openhuninn-2.1"').then(() => {
                renderDOM();
            });
        }
    });

    randomizeLimitOrders(); 
    animateAll();       
</script>
