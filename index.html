<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asia Crazy Team 封神戰隊 - K線與熱圖分離版模擬器</title>
    <style>
        /* 本地字體對應 */
        @font-face {
            font-family: 'jf-openhuninn-2.1';
            src: local('jf-openhuninn-2.1'),
                 local('jf openhuninn 2.1'),
                 local('jf-open-hunyuan'),
                 url('jf-openhuninn-2.1.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* 強制全網頁套用粉圓體 */
        * {
            font-family: 'jf-openhuninn-2.1', 'PingFang TC', 'Microsoft JhengHei', sans-serif !important;
            box-sizing: border-box;
        }

        body {
            background-color: #121212;
            color: #e0e0e0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
        }

        .team-title {
            font-size: clamp(24px, 5vw, 38px);
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 5px;
            text-align: center;
            text-shadow: 0 0 10px rgba(109, 40, 217, 0.8);
            letter-spacing: 2px;
            background: linear-gradient(45deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .team-subtitle {
            font-size: clamp(12px, 3vw, 16px);
            font-weight: bold;
            color: #94a3b8;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-align: center;
        }

        .disclaimer {
            background-color: #333;
            color: #f87171;
            padding: 5px 15px;
            font-size: 12px;
            margin-bottom: 15px;
            border-radius: 4px;
            text-align: center;
            border: 1px solid #444;
        }

        .control-panel {
            display: flex;
            gap: 10px;
            align-items: center;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 850px;
            border: 1px solid #333;
        }
        
        .control-group {
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.1s;
            font-size: 13px;
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
        }
        .btn:active { transform: translateY(2px); box-shadow: none; }
        
        .btn-buy { background-color: #28a745; }
        .btn-sell { background-color: #dc3545; }
        .btn-random { background-color: #475569; } 
        .btn-toggle-on { background-color: #0284c7; } 
        .btn-toggle-off { background-color: #be185d; } 
        .btn-auto-off { background-color: #ea580c; } 
        .btn-auto-on { background-color: #7c3aed; animation: pulse 1.5s infinite; } 
        .btn-mute-off { background-color: #059669; }
        .btn-mute-on { background-color: #4b5563; }

        .select-speed {
            padding: 7px 5px;
            border-radius: 4px;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: white;
            font-weight: bold;
            outline: none;
            cursor: pointer;
            font-size: 13px;
        }

        @keyframes pulse {
            0% { opacity: 1; box-shadow: 0 0 0 0 rgba(124, 58, 237, 0.7); }
            70% { opacity: 0.8; box-shadow: 0 0 0 10px rgba(124, 58, 237, 0); }
            100% { opacity: 1; box-shadow: 0 0 0 0 rgba(124, 58, 237, 0); }
        }

        .input-qty {
            width: 50px;
            padding: 6px;
            text-align: center;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: white;
            border-radius: 4px;
            font-size: 14px;
        }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        .hotkey-tip {
            font-size: 10px;
            color: #9ca3af;
            display: block;
            margin-top: 2px;
            font-weight: normal;
            text-align: center;
        }
        
        .responsive-wrapper {
            width: 100%;
            max-width: 1100px; 
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-radius: 8px;
            background: #1a1a1a;
            border: 1px solid #333;
        }

        .main-container {
            display: flex;
            gap: 15px;
            align-items: flex-start;
            padding: 15px;
            min-width: 900px; 
        }

        canvas {
            background-color: #000000;
            border-radius: 4px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            flex-shrink: 0;
            border: 1px solid #333;
        }

        .canvas-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .canvas-label {
            font-size: 12px;
            color: #9ca3af;
            text-align: center;
            font-weight: bold;
        }

        table {
            border-collapse: collapse;
            font-size: 13px;
            text-align: center;
            flex-grow: 1;
            color: #e2e8f0;
            margin-top: 21px; 
        }
        th, td {
            padding: 6px 4px; 
            border: 1px solid #3f3f46;
            min-width: 50px;
        }
        th {
            background-color: #27272a;
            font-weight: bold;
            white-space: nowrap;
            color: #a1a1aa;
        }
        
        .cell-input {
            width: 100%;
            background: transparent;
            border: none;
            text-align: center;
            font-weight: bold;
            font-size: 13px;
            outline: none;
            color: white !important; 
        }
        
        .bg-ask-zone { background-color: rgba(220, 53, 69, 0.08); } 
        .bg-bid-zone { background-color: rgba(0, 123, 255, 0.08); } 
        
        .col-limit-buy { background-color: rgba(0, 21, 148, 0.8); padding: 2px !important; } 
        .col-limit-sell { background-color: rgba(140, 0, 0, 0.8); padding: 2px !important; } 
        
        .delta-positive { color: #4ade80; font-weight: bold; background-color: rgba(74, 222, 128, 0.1); }
        .delta-negative { color: #f87171; font-weight: bold; background-color: rgba(248, 113, 113, 0.1); }
        
        .col-volume {
            position: relative;
            font-weight: bold;
            color: #fff;
            text-align: left;
            padding: 4px 6px !important;
            min-width: 80px;
        }
        
        .volume-bar-wrapper {
            width: 100%;
            height: 18px;
            line-height: 18px;
            border: 1px solid #475569; 
            border-radius: 3px;
            padding-left: 4px;
            box-sizing: border-box;
            background-color: #1e293b;
            transition: background 0.15s ease;
            text-shadow: 1px 1px 2px black;
        }
        
        .current-price {
            background-color: rgba(234, 179, 8, 0.2) !important;
            font-weight: bold;
        }

        .current-price-box {
            display: inline-block;
            border: 2px solid #fbbf24; 
            padding: 2px 6px;
            border-radius: 3px;
            background-color: #000000;
            color: #fbbf24;
        }

        .best-ask-box { color: #fca5a5; font-weight: bold; }
        .best-bid-box { color: #93c5fd; font-weight: bold; }

        @media (max-width: 600px) {
            .control-panel { padding: 10px; gap: 8px; }
            .btn { padding: 6px 10px; font-size: 12px; }
            .hotkey-tip { display: none; }
        }
    </style>
</head>
<body>

    <div class="team-title">Asia Crazy Team 封神戰隊</div>
    <div class="team-subtitle">K線與熱圖分離版 DOM 模擬器</div>

    <div class="disclaimer">本模擬器僅為知識講解，不作為任何投資建議</div>

    <div class="control-panel">
        <label style="font-size: 13px; cursor: pointer;">
            <input type="checkbox" id="slip-control" checked> 無滑點控制
        </label>
        
        <button class="btn btn-random" onclick="randomizeLimitOrders()">🎲 隨機配置</button>
        <button id="btn-toggle-autofill" class="btn btn-toggle-on" onclick="toggleAutoFill()">🤖 造市補單：開啟中</button>
        <button id="btn-toggle-mute" class="btn btn-mute-off" onclick="toggleMute()">🔊 音效：開啟</button>
        
        <div class="control-group">
            <button id="btn-toggle-auto" class="btn btn-auto-off" onclick="toggleAutoTrading()">⚡ 自動撮合：關閉</button>
            <select id="select-speed" class="select-speed" onchange="handleSpeedChange()">
                <option value="500">0.5x 慢速</option>
                <option value="250" selected>1x 正常</option>
                <option value="50">2x 快速</option>
                <option value="10">5x 極速</option>
            </select>
        </div>
        
        <div class="control-group">
            <div>
                <button id="btn-buy-panel" class="btn btn-buy" onclick="handleMarketOrder('BUY', null)">市價買入</button>
                <span class="hotkey-tip">快捷鍵: B</span>
            </div>
            <input type="number" id="buy-qty" class="input-qty" value="5" min="1">
        </div>
        
        <div class="control-group">
            <div>
                <button id="btn-sell-panel" class="btn btn-sell" onclick="handleMarketOrder('SELL', null)">市價賣出</button>
                <span class="hotkey-tip">快捷鍵: S</span>
            </div>
            <input type="number" id="sell-qty" class="input-qty" value="5" min="1">
        </div>
    </div>

    <div class="responsive-wrapper">
        <div class="main-container">
            
            <div class="canvas-container">
                <div class="canvas-label">動態 K 線 (5s/根)</div>
                <canvas id="kline-canvas" width="220" height="420"></canvas>
            </div>

            <div class="canvas-container">
                <div class="canvas-label">DOM 熱圖軌跡</div>
                <canvas id="heatmap-canvas" width="220" height="420"></canvas>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>限價多</th>
                        <th>市價空</th>
                        <th>Price</th>
                        <th>市價多</th>
                        <th>限價空</th>
                        <th>Delta</th>
                        <th>Volume</th>
                    </tr>
                </thead>
                <tbody id="dom-body">
                    </tbody>
            </table>
        </div>
    </div>

<script>
    let currentPriceIndex = 7; 
    let marketData = [];
    let isAutoFillEnabled = true; 
    let isAutoTradingEnabled = false; 
    let isMuted = false;              
    let autoTradingTimer = null;      

    // --- 熱圖參數 ---
    const HEATMAP_COLUMNS = 75; 
    let heatmapHistory = [];
    let heatmapTimer = null;

    // --- 歷史 K 線參數 ---
    const KLINE_INTERVAL = 5000; 
    const MAX_KLINES = 12;       
    let klineHistory = [];       
    let klineIntervalTimer = null; 

    let targetKLine = { open: 0, high: 0, low: 0, close: 0 };
    let currentKLine = { open: 0, high: 0, low: 0, close: 0 };

    function getHunYuanFont() {
        return '11px "jf-openhuninn-2.1", "PingFang TC", sans-serif';
    }

    function resetMarketData() {
        marketData = [];
        let basePrice = 2980.6;
        for (let i = 0; i < 15; i++) {
            marketData.push({
                price: basePrice - (i * 0.1),
                limitBuy: 0,
                limitSell: 0,
                marketSell: 0, 
                marketBuy: 0,  
                delta: 0,      
                volume: 0      
            });
        }
        heatmapHistory = []; 
    }

    let globalAudioCtx = null;

    function initAudio() {
        if (!globalAudioCtx) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            globalAudioCtx = new AudioContext();
        }
        if (globalAudioCtx.state === 'suspended') {
            globalAudioCtx.resume();
        }
    }

    function playSound(type) {
        if (isMuted) return; 
        initAudio();
        if (!globalAudioCtx) return;

        try {
            const masterGain = globalAudioCtx.createGain();
            masterGain.connect(globalAudioCtx.destination);

            if (type === 'BUY') {
                const frequencies = [1050, 1480, 2200];
                frequencies.forEach((freq, index) => {
                    const osc = globalAudioCtx.createOscillator();
                    const oscGain = globalAudioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, globalAudioCtx.currentTime);
                    oscGain.gain.setValueAtTime(index === 0 ? 0.25 : 0.12, globalAudioCtx.currentTime);
                    oscGain.gain.exponentialRampToValueAtTime(0.0001, globalAudioCtx.currentTime + 1.2);
                    osc.connect(oscGain);
                    oscGain.connect(masterGain);
                    osc.start();
                    osc.stop(globalAudioCtx.currentTime + 1.3);
                });
            } else if (type === 'SELL') {
                const osc = globalAudioCtx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(280, globalAudioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(140, globalAudioCtx.currentTime + 0.08);
                masterGain.gain.setValueAtTime(0.4, globalAudioCtx.currentTime);
                masterGain.gain.exponentialRampToValueAtTime(0.0001, globalAudioCtx.currentTime + 0.12);
                osc.connect(masterGain);
                osc.start();
                osc.stop(globalAudioCtx.currentTime + 0.15);
            }
        } catch (e) {
            console.log("音訊連續播放受限:", e);
        }
    }

    function recordHeatmapSnapshot() {
        if (marketData.length === 0) return;
        let snapshot = {
            price: marketData[currentPriceIndex].price,
            depth: marketData.map(r => ({ b: r.limitBuy, s: r.limitSell }))
        };
        heatmapHistory.push(snapshot);
        if(heatmapHistory.length > HEATMAP_COLUMNS) heatmapHistory.shift();
    }

    function startEngines() {
        if(heatmapTimer) clearInterval(heatmapTimer);
        heatmapTimer = setInterval(recordHeatmapSnapshot, 100); 

        if(klineIntervalTimer) clearInterval(klineIntervalTimer);
        klineIntervalTimer = setInterval(() => {
            klineHistory.push({
                open: targetKLine.open,
                high: targetKLine.high,
                low: targetKLine.low,
                close: targetKLine.close
            });
            if(klineHistory.length > MAX_KLINES) klineHistory.shift();

            let currentClose = targetKLine.close;
            targetKLine = { open: currentClose, high: currentClose, low: currentClose, close: currentClose };
            currentKLine = { open: currentClose, high: currentClose, low: currentClose, close: currentClose };
        }, KLINE_INTERVAL);
    }

    // 【全新重構】自適應畫布 Y 軸轉換函數：全自動捕捉最大與最小值進行比例縮放
    function getDynamicY(price, canvasHeight, allBars) {
        if (allBars.length === 0) {
            // 如果暫時沒有任何數據，使用原本的固定預設比例計算
            let percentage = (2980.6 - price) / (2980.6 - 2979.2);
            return 35 + percentage * (canvasHeight - 65);
        }

        // 撈出目前所有歷史與當前 K 線中的極端最高價與最低價
        let minP = Infinity;
        let maxP = -Infinity;
        allBars.forEach(b => {
            if (b.low < minP) minP = b.low;
            if (b.high > maxP) maxP = b.high;
        });

        // 加上適度的上下邊距留白（Buffer），避免價格貼死在畫布邊緣
        let padding = (maxP - minP) * 0.15;
        if (padding === 0) padding = 0.2; // 防止完全平盤時除以零
        
        let minBound = minP - padding;
        let maxBound = maxP + padding;

        // 計算對應的 Y 軸座標
        let ratio = (price - minBound) / (maxBound - minBound);
        // 倒轉網頁 Y 軸（網頁上方是0，所以用高度去減）
        return (canvasHeight - 40) - (ratio * (canvasHeight - 65));
    }

    // 固定熱圖專用的原版 Y 軸轉換，保持熱圖與 DOM 表格的行橫向平行對齊
    function getFixedYForHeatmap(price) {
        let percentage = (2980.6 - price) / (2980.6 - 2979.2);
        return 35 + percentage * (390 - 35);
    }

    function drawGridLines(ctx, width, height, isDynamic, allBars) {
        ctx.strokeStyle = '#222';
        ctx.lineWidth = 1;
        
        if (!isDynamic) {
            // 熱圖固定隔線：直接對應 15 檔位
            for (let i = 0; i <= 15; i++) {
                let y = 35 + (i * 25.3); 
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
            }
        } else {
            // K線動態隔線：改用固定間距繪製背景參考線
            for (let i = 0; i <= 10; i++) {
                let y = 25 + (i * (height - 50) / 10);
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
            }
        }
    }

    function animateAll() {
        currentKLine.open  += (targetKLine.open  - currentKLine.open)  * 0.18;
        currentKLine.close += (targetKLine.close - currentKLine.close) * 0.18;
        currentKLine.high  += (targetKLine.high  - currentKLine.high)  * 0.18;
        currentKLine.low   += (targetKLine.low   - currentKLine.low)   * 0.18;

        drawKLineCanvas();
        drawHeatmapCanvas();
        requestAnimationFrame(animateAll);
    }

    // 【分離的區塊 1】獨立繪製 K 線窗格（完美實現自由縮放不侷限高低點）
    function drawKLineCanvas() {
        const canvas = document.getElementById('kline-canvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 打包目前畫面上所有的 K 線數據（包含歷史陣列與當前動態成型中的那一根）
        let allBars = [...klineHistory, { high: currentKLine.high, low: currentKLine.low }];

        // 繪製背景參考格線
        drawGridLines(ctx, canvas.width, canvas.height, true, allBars);

        let colWidth = canvas.width / (MAX_KLINES + 1.5); 
        let candleWidth = colWidth * 0.6; 

        // --- 1. 繪製歷史 K 線 ---
        klineHistory.forEach((candle, index) => {
            let xCenter = (index + 0.5) * colWidth;
            let yOpen = getDynamicY(candle.open, canvas.height, allBars);
            let yClose = getDynamicY(candle.close, canvas.height, allBars);
            let yHigh = getDynamicY(candle.high, canvas.height, allBars);
            let yLow = getDynamicY(candle.low, canvas.height, allBars);
            
            let isBullish = candle.close >= candle.open;
            let themeColor = isBullish ? '#4ade80' : '#f87171';

            ctx.strokeStyle = themeColor;
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(xCenter, yHigh); ctx.lineTo(xCenter, yLow); ctx.stroke();

            ctx.fillStyle = themeColor;
            let boxHeight = yClose - yOpen;
            if (Math.abs(boxHeight) < 1.5) boxHeight = isBullish ? -1.5 : 1.5; 
            ctx.fillRect(xCenter - (candleWidth / 2), yOpen, candleWidth, boxHeight);
        });

        // --- 2. 繪製最右側當前動態成型的果凍 K 線 ---
        let currentXCenter = (klineHistory.length + 0.5) * colWidth;
        let yOpenCurr = getDynamicY(currentKLine.open, canvas.height, allBars);
        let yCurrentSmooth = getDynamicY(currentKLine.close, canvas.height, allBars);
        let yHighCurr = getDynamicY(currentKLine.high, canvas.height, allBars);
        let yLowCurr = getDynamicY(currentKLine.low, canvas.height, allBars);

        let isBullishCurr = currentKLine.close >= currentKLine.open;
        let themeColorCurr = isBullishCurr ? '#4ade80' : '#f87171';

        ctx.strokeStyle = themeColorCurr;
        ctx.lineWidth = 2.5; 
        ctx.beginPath(); ctx.moveTo(currentXCenter, yHighCurr); ctx.lineTo(currentXCenter, yLowCurr); ctx.stroke();

        ctx.fillStyle = themeColorCurr;
        let boxHeightCurr = yCurrentSmooth - yOpenCurr;
        if (Math.abs(boxHeightCurr) < 2) boxHeightCurr = isBullishCurr ? -2 : 2;
        ctx.fillRect(currentXCenter - (candleWidth / 2), yOpenCurr, candleWidth, boxHeightCurr);

        // --- 3. 現價水平跟隨雷射線 ---
        ctx.strokeStyle = 'rgba(251, 191, 36, 0.5)';
        ctx.setLineDash([4, 4]);
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(0, yCurrentSmooth); ctx.lineTo(canvas.width, yCurrentSmooth); ctx.stroke();
        ctx.setLineDash([]); 

        let currentRealPrice = marketData[currentPriceIndex].price;
        ctx.fillStyle = '#ffffff';
        ctx.font = getHunYuanFont(); 
        ctx.fillText(`現價: ${currentRealPrice.toFixed(1)}`, 5, canvas.height - 12);
    }

    // 【分離的區塊 2】獨立繪製 DOM 熱圖瀑布流（保持與 DOM 表格橫向對齊平行）
    function drawHeatmapCanvas() {
        const canvas = document.getElementById('heatmap-canvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        drawGridLines(ctx, canvas.width, canvas.height, false, []);

        if (heatmapHistory.length === 0) return;

        let colWidth = canvas.width / HEATMAP_COLUMNS;
        let maxDepthParam = 30; 

        heatmapHistory.forEach((snap, hIndex) => {
            let x = canvas.width - ((heatmapHistory.length - hIndex) * colWidth);
            
            snap.depth.forEach((d, rIndex) => {
                let yCenter = 35 + (rIndex * 25.3);
                let rectY = yCenter - 12.6; 
                let rectH = 25.4; 

                if (d.s > 0) {
                    let alpha = Math.min(d.s / maxDepthParam, 1);
                    ctx.fillStyle = `rgba(220, 53, 69, ${alpha * 0.9})`;
                    ctx.fillRect(x, rectY, colWidth + 0.6, rectH); 
                } else if (d.b > 0) {
                    let alpha = Math.min(d.b / maxDepthParam, 1);
                    ctx.fillStyle = `rgba(0, 100, 255, ${alpha * 0.9})`; 
                    ctx.fillRect(x, rectY, colWidth + 0.6, rectH);
                }
            });
        });

        ctx.beginPath();
        ctx.strokeStyle = '#fbbf24'; 
        ctx.lineWidth = 2;
        ctx.shadowColor = '#000'; ctx.shadowBlur = 4;

        heatmapHistory.forEach((snap, hIndex) => {
            let x = canvas.width - ((heatmapHistory.length - hIndex) * colWidth) + (colWidth / 2);
            let y = getFixedYForHeatmap(snap.price);
            
            if (hIndex === 0) {
                ctx.moveTo(x, y);
            } else {
                let prevSnap = heatmapHistory[hIndex - 1];
                let prevY = getFixedYForHeatmap(prevSnap.price);
                ctx.lineTo(x, prevY); 
                ctx.lineTo(x, y);
            }
        });
        ctx.stroke();
        ctx.shadowBlur = 0; 

        let yCurrentSmoothFixed = getFixedYForHeatmap(currentKLine.close);
        ctx.strokeStyle = 'rgba(251, 191, 36, 0.8)';
        ctx.setLineDash([4, 4]);
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(0, yCurrentSmoothFixed); ctx.lineTo(canvas.width, yCurrentSmoothFixed); ctx.stroke();
        ctx.setLineDash([]); 
    }

    function randomizeLimitOrders() {
        currentPriceIndex = 7;
        resetMarketData(); 
        klineHistory = []; 

        marketData.forEach((row, index) => {
            if (index < currentPriceIndex) {
                row.limitSell = Math.floor(Math.random() * 31);
            } else if (index > currentPriceIndex) {
                row.limitBuy = Math.floor(Math.random() * 31);
            }
        });

        let initPrice = marketData[currentPriceIndex].price;
        targetKLine = { open: initPrice, high: initPrice, low: initPrice, close: initPrice };
        currentKLine = { open: initPrice, high: initPrice, low: initPrice, close: initPrice };

        if (isAutoFillEnabled) autoFillMarketDepth();
        renderDOM();
        
        for(let i=0; i<HEATMAP_COLUMNS; i++) recordHeatmapSnapshot(); 
        startEngines(); 
    }

    function toggleAutoFill() {
        const btn = document.getElementById('btn-toggle-autofill');
        isAutoFillEnabled = !isAutoFillEnabled;
        
        if (isAutoFillEnabled) {
            btn.className = "btn btn-toggle-on";
            btn.innerText = "🤖 造市補單：開啟中";
            autoFillMarketDepth(); 
        } else {
            btn.className = "btn btn-toggle-off";
            btn.innerText = "🔒 獨立沙盒：關閉補單";
        }
        renderDOM();
    }

    function toggleMute() {
        const btn = document.getElementById('btn-toggle-mute');
        isMuted = !isMuted;
        if (isMuted) {
            btn.className = "btn btn-toggle-off";
            btn.innerText = "🔇 音效：已靜音";
        } else {
            btn.className = "btn btn-mute-off";
            btn.innerText = "🔊 音效：開啟";
            initAudio(); 
        }
    }

    function handleSpeedChange() {
        if (isAutoTradingEnabled) {
            clearInterval(autoTradingTimer);
            startAutoInterval();
        }
    }

    function startAutoInterval() {
        let speed = parseInt(document.getElementById('select-speed').value);
        autoTradingTimer = setInterval(() => {
            let side = Math.random() > 0.5 ? 'BUY' : 'SELL';
            let randomQty = Math.floor(Math.random() * 4) + 2; 
            handleMarketOrder(side, randomQty);
        }, speed);
    }

    function toggleAutoTrading() {
        initAudio(); 
        const btn = document.getElementById('btn-toggle-auto');
        isAutoTradingEnabled = !isAutoTradingEnabled;

        if (isAutoTradingEnabled) {
            btn.className = "btn btn-auto-on";
            btn.innerText = "⚡ 自動撮合：模擬中";
            startAutoInterval();
        } else {
            btn.className = "btn btn-auto-off";
            btn.innerText = "⚡ 自動撮合：關閉";
            clearInterval(autoTradingTimer);
        }
    }

    function autoFillMarketDepth() {
        marketData.forEach((row, index) => {
            if (index < currentPriceIndex) {
                if (row.limitSell === 0 && row.limitBuy === 0) {
                    row.limitSell = Math.floor(Math.random() * 15) + 1;
                }
                row.limitBuy = 0; 
            } else if (index > currentPriceIndex) {
                if (row.limitBuy === 0 && row.limitSell === 0) {
                    row.limitBuy = Math.floor(Math.random() * 15) + 1;
                }
                row.limitSell = 0; 
            } else {
                row.limitBuy = 0;
                row.limitSell = 0;
            }
        });
    }

    window.addEventListener('click', initAudio);
    window.addEventListener('touchstart', initAudio, {passive: true});

    window.addEventListener('keydown', function(event) {
        if (event.target.tagName === 'INPUT') return;

        const key = event.key.toLowerCase();
        if (key === 'b') {
            event.preventDefault();
            handleMarketOrder('BUY', null);
            const btn = document.getElementById('btn-buy-panel');
            btn.style.transform = 'translateY(2px)';
            setTimeout(() => btn.style.transform = 'none', 100);
        } else if (key === 's') {
            event.preventDefault();
            handleMarketOrder('SELL', null);
            const btn = document.getElementById('btn-sell-panel');
            btn.style.transform = 'translateY(2px)';
            setTimeout(() => btn.style.transform = 'none', 100);
        }
    });

    function updateLimitValue(index, field, value) {
        marketData[index][field] = parseInt(value) || 0;
    }

    function renderDOM() {
        const tbody = document.getElementById('dom-body');
        tbody.innerHTML = '';

        let maxVolume = Math.max(...marketData.map(r => r.volume), 1);
        let maxLimitParam = 30;

        let bestAskIndex = -1;
        for (let i = currentPriceIndex - 1; i >= 0; i--) {
            if (marketData[i].limitSell > 0) {
                bestAskIndex = i;
                break;
            }
        }
        
        let bestBidIndex = -1;
        for (let i = currentPriceIndex + 1; i < marketData.length; i++) {
            if (marketData[i].limitBuy > 0) {
                bestBidIndex = i;
                break;
            }
        }

        marketData.forEach((row, index) => {
            const tr = document.createElement('tr');
            let isCurrentPriceRow = (index === currentPriceIndex);
            let rowBgClass = '';

            if (index < currentPriceIndex) {
                rowBgClass = 'bg-ask-zone';
            } else if (index > currentPriceIndex) {
                rowBgClass = 'bg-bid-zone';
            } else {
                rowBgClass = 'current-price';
            }

            tr.className = rowBgClass;

            let deltaClass = '';
            if (row.delta > 0) deltaClass = 'delta-positive';
            else if (row.delta < 0) deltaClass = 'delta-negative';

            if (!isAutoFillEnabled) {
                if (index < currentPriceIndex) row.limitBuy = 0;
                if (index > currentPriceIndex) row.limitSell = 0;
                if (index === currentPriceIndex) { row.limitBuy = 0; row.limitSell = 0; }
            }

            let buyLimitPercentage = (row.limitBuy / maxLimitParam) * 100;
            let buyLimitStyle = row.limitBuy > 0 
                ? `background: linear-gradient(to left, rgba(0, 100, 255, 0.4) ${buyLimitPercentage}%, rgba(0, 21, 148, 0.8) ${buyLimitPercentage}%);` 
                : 'background-color: transparent;';

            let sellLimitPercentage = (row.limitSell / maxLimitParam) * 100;
            let sellLimitStyle = row.limitSell > 0 
                ? `background: linear-gradient(to right, rgba(220, 53, 69, 0.4) ${sellLimitPercentage}%, rgba(140, 0, 0, 0.8) ${sellLimitPercentage}%);` 
                : 'background-color: transparent;';

            let volPercentage = (row.volume / maxVolume) * 100;
            let isVolumeLeader = (row.volume > 0 && row.volume === maxVolume);
            let barColor = isVolumeLeader ? '#fca5a5' : '#64748b';

            let volStyle = row.volume > 0 
                ? `background: linear-gradient(to right, ${barColor} ${volPercentage}%, transparent ${volPercentage}%);` 
                : '';

            let priceFormatted = row.price.toFixed(1);
            let priceDisplay = priceFormatted;

            if (isCurrentPriceRow) {
                priceDisplay = `<span class="current-price-box">${priceFormatted}</span>`;
            } else if (index === bestAskIndex) {
                priceDisplay = `<span class="best-ask-box">[ ${priceFormatted} ]</span>`;
            } else if (index === bestBidIndex) {
                priceDisplay = `<span class="best-bid-box">[ ${priceFormatted} ]</span>`;
            }

            // 輸出 HTML：已將原本的 PNL/TICK td 移除
            tr.innerHTML = `
                <td class="col-limit-buy" style="${buyLimitStyle}">
                    <input type="number" class="cell-input" value="${row.limitBuy || ''}" min="0" onchange="updateLimitValue(${index}, 'limitBuy', this.value)">
                </td>
                <td>${row.marketSell || ''}</td>
                <td>${priceDisplay}</td>
                <td>${row.marketBuy || ''}</td>
                <td class="col-limit-sell" style="${sellLimitStyle}">
                    <input type="number" class="cell-input" value="${row.limitSell || ''}" min="0" onchange="updateLimitValue(${index}, 'limitSell', this.value)">
                </td>
                <td class="${deltaClass}">${row.delta || ''}</td>
                <td class="col-volume">
                    <div class="volume-bar-wrapper" style="${volStyle}">
                        ${row.volume || ''}
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function handleMarketOrder(type, customQty = null) {
        playSound(type);

        let qty = customQty !== null 
            ? customQty 
            : parseInt(document.getElementById(type === 'BUY' ? 'buy-qty' : 'sell-qty').value) || 0;
            
        if (qty <= 0) return;

        if (type === 'BUY') {
            for (let i = currentPriceIndex - 1; i >= 0; i--) {
                if (marketData[i].limitSell > 0) {
                    let filled = Math.min(qty, marketData[i].limitSell);
                    marketData[i].marketBuy += filled;
                    marketData[i].delta = marketData[i].marketBuy - marketData[i].marketSell;
                    marketData[i].volume = marketData[i].marketBuy + marketData[i].marketSell;

                    if (qty >= marketData[i].limitSell) {
                        qty -= marketData[i].limitSell;
                        marketData[i].limitSell = 0;
                        currentPriceIndex = i; 
                        if (qty === 0) break;
                    } else {
                        marketData[i].limitSell -= qty;
                        qty = 0;
                        currentPriceIndex = i + 1; 
                        break;
                    }
                }
            }
        } else if (type === 'SELL') {
            for (let i = currentPriceIndex; i < marketData.length; i++) {
                if (marketData[i].limitBuy > 0) {
                    let filled = Math.min(qty, marketData[i].limitBuy);
                    marketData[i].marketSell += filled;
                    marketData[i].delta = marketData[i].marketBuy - marketData[i].marketSell;
                    marketData[i].volume = marketData[i].marketBuy + marketData[i].marketSell;

                    if (qty >= marketData[i].limitBuy) {
                        qty -= marketData[i].limitBuy;
                        marketData[i].limitBuy = 0;
                        currentPriceIndex = i;
                        if (qty === 0) break;
                    } else {
                        marketData[i].limitBuy -= qty;
                        qty = 0;
                        currentPriceIndex = i - 1; 
                        break;
                    }
                }
            }
            if (currentPriceIndex >= marketData.length) currentPriceIndex = marketData.length - 1;
            if (currentPriceIndex < 0) currentPriceIndex = 0;
        }

        let newPrice = marketData[currentPriceIndex].price;
        targetKLine.close = newPrice; 
        if (newPrice > targetKLine.high) targetKLine.high = newPrice; 
        if (newPrice < targetKLine.low) targetKLine.low = newPrice;   

        if (isAutoFillEnabled) autoFillMarketDepth();
        renderDOM(); 
        recordHeatmapSnapshot(); 
    }

    document.addEventListener("DOMContentLoaded", function() {
        if (document.fonts) {
            document.fonts.load('12px "jf-openhuninn-2.1"').then(() => {
                renderDOM();
            });
        }
    });

    randomizeLimitOrders(); 
    animateAll();       
</script>
</body>
</html>
